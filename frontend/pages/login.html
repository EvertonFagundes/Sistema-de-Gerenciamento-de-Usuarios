<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/style.css">
    <title>Sistema de Gerenciamento de Usuários</title>
</head>
<body>
    <header>
        <nav class="navbar"></nav>
    </header>
    <h1 class="titulo" id="titulo-login">Área de login</h1>
    <main>
        <div id="container-login">
            <form onsubmit="login(event)">
                <label for="email">E-mail:</label>
                <input type="email" name="email" id="email" required>
                <label for="senha">Senha:</label>
                <input type="password" name="senha" id="senha" required>
                <button type="submit" name="btn-entrar" id="btn-entrar">entrar</button>
            </form>
            <span>
                <a href="./cadastro.html">Não possui conta? Cadastre-se aqui!</a>
            </span>
        </div>
    </main>
    <script src="../scripts/navbar.js"></script>
    <script src="../scripts/script.js"></script>
</body>
</html>
